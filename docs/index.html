<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Time App">
    <title>Time App</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="stylesheet" href="./styles.css?v=history-1">
  </head>
  <body>
    <main class="screen">
      <section id="start-view" class="start-view" aria-labelledby="app-title">
        <p class="eyebrow" id="today-label">Tallinn day</p>
        <h1 id="app-title">Time App</h1>
        <form id="sync-form" class="sync-form">
          <label for="sync-name">Sync name</label>
          <div class="entry-row">
            <input id="sync-name" name="sync-name" type="text" autocomplete="off" placeholder="user 1">
            <button type="submit" class="primary">Use</button>
          </div>
        </form>
        <p id="sync-label" class="sync-label" hidden></p>
        <div id="db-warning-start" class="db-warning" hidden>
          <p id="status-message-start" aria-live="polite"></p>
          <button id="retry-sync-start" type="button" class="ghost">Retry Database</button>
        </div>
        <section id="summary" class="summary" aria-labelledby="summary-title" hidden>
          <h2 id="summary-title">End day summary</h2>
          <p id="summary-stats"></p>
          <div class="summary-block">
            <h3>Completed</h3>
            <ul id="summary-done"></ul>
          </div>
          <div class="summary-block">
            <h3>Incomplete</h3>
            <ul id="summary-incomplete"></ul>
          </div>
        </section>
        <button id="start-day" type="button" class="primary big">Start Day</button>
        <section id="history" class="history" aria-labelledby="history-title" hidden>
          <h2 id="history-title">History</h2>
          <div class="chart-block">
            <h3>Day completion</h3>
            <div id="completion-chart" class="completion-chart"></div>
          </div>
          <div class="chart-block">
            <h3>Task done times</h3>
            <div id="task-time-chart" class="task-time-chart"></div>
          </div>
        </section>
      </section>

      <section id="day-view" class="day-view" aria-label="Day activities" hidden>
        <p id="sync-label-day" class="sync-label"></p>
        <section id="current-card" class="current-card" aria-live="polite" hidden>
          <span id="progress-label" class="progress-label">0 / 0</span>
          <span class="current-label">Current task:</span>
          <h2 id="current-activity"></h2>
          <button id="done" type="button" class="primary">Done</button>
        </section>

        <form id="activity-form" class="activity-form">
          <label for="activity-input">Activity</label>
          <div class="entry-row">
            <input id="activity-input" name="activity" type="text" autocomplete="off" placeholder="Add activity">
            <button type="submit" class="primary">Add</button>
          </div>
        </form>

        <section class="wheel-section" aria-label="Activity order">
          <ol id="activity-wheel" class="activity-wheel" aria-label="Activity order"></ol>
        </section>

        <div class="end-day-row">
          <button id="end-day" type="button" class="ghost">End Day</button>
        </div>
        <div id="db-warning-day" class="db-warning" hidden>
          <p id="status-message-day" aria-live="polite"></p>
          <button id="retry-sync-day" type="button" class="ghost">Retry Database</button>
        </div>
      </section>
    </main>

    <script src="./supabase.js?v=02fb662"></script>
    <script src="./app.js?v=history-1"></script>
  </body>
</html>
